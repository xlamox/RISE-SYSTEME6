<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daily System — جدول اليوم</title>
<style>
  :root{
    --bg0:#050711;
    --bg1:#0b1020;
    --txt:#eef3ff;
    --muted:rgba(238,243,255,.65);
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.14);
    --shadow: 0 18px 70px rgba(0,0,0,.55);
    --accent:#8b5cf6;
    --accent2:#22c55e;
    --warn:#f59e0b;
    --danger:#ef4444;
    --glass: rgba(255,255,255,.06);
    --glass2: rgba(0,0,0,.25);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans Arabic", Arial, sans-serif;
    color: var(--txt);
    background:
      radial-gradient(900px 520px at 80% 20%, rgba(139,92,246,.18), transparent 60%),
      radial-gradient(700px 480px at 20% 85%, rgba(34,197,94,.12), transparent 58%),
      radial-gradient(700px 420px at 25% 20%, rgba(245,158,11,.10), transparent 55%),
      linear-gradient(180deg, var(--bg0), var(--bg1));
    overflow:hidden;
  }

  /* خلفية متحركة لطيفة */
  .bgfx{
    position:fixed; inset:-20%;
    background:
      radial-gradient(circle at 30% 40%, rgba(139,92,246,.16), transparent 55%),
      radial-gradient(circle at 70% 60%, rgba(34,197,94,.10), transparent 55%),
      radial-gradient(circle at 50% 30%, rgba(245,158,11,.08), transparent 55%);
    filter: blur(40px);
    animation: drift 14s ease-in-out infinite alternate;
    pointer-events:none;
    opacity:.9;
  }
  @keyframes drift{
    from{transform: translate3d(-2%, -1%, 0) scale(1.05)}
    to{transform: translate3d(2%, 1.5%, 0) scale(1.08)}
  }

  .wrap{
    height:100%;
    display:flex;
    flex-direction:column;
    max-width: 980px;
    margin: 0 auto;
    padding: 18px;
    gap: 12px;
  }

  /* Top bar */
  .top{
    display:flex;
    flex-wrap:wrap;
    justify-content:space-between;
    gap:12px;
    align-items:center;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .brand h1{
    margin:0;
    font-size:20px;
    letter-spacing:.2px;
  }
  .brand .sub{
    color: var(--muted);
    font-size: 13px;
  }

  .hud{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:flex-end;
  }

  .pill{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 10px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    font-size: 13px;
    color: var(--muted);
  }
  .pill strong{color:var(--txt)}
  .dot{
    width:10px;height:10px;border-radius:999px;
    background: var(--accent2);
    box-shadow: 0 0 0 6px rgba(34,197,94,.12);
  }
  .clock{
    font-variant-numeric: tabular-nums;
    font-weight: 900;
    letter-spacing:.3px;
  }

  /* Card */
  .card{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow:hidden;
    backdrop-filter: blur(12px);
    position:relative;
  }

  .progressWrap{
    padding: 14px 14px 10px;
    border-bottom: 1px solid rgba(255,255,255,.10);
    background: rgba(255,255,255,.04);
  }

  .progressTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }

  .rank{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.22);
  }
  .badge{
    width:34px;height:34px;border-radius: 12px;
    display:grid; place-items:center;
    font-weight: 1000;
    letter-spacing:.5px;
    box-shadow: 0 14px 35px rgba(0,0,0,.35);
  }
  .rank small{color:var(--muted); display:block; font-size:12px}
  .rank strong{display:block; font-size:13px}

  .bar{
    height: 14px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 999px;
    overflow:hidden;
    position:relative;
  }
  .bar > i{
    display:block;
    height:100%;
    width:0%;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(139,92,246,.95), rgba(34,197,94,.92));
    box-shadow: 0 0 0 1px rgba(255,255,255,.18) inset, 0 12px 35px rgba(139,92,246,.18);
    transition: width .35s ease;
  }
  .barGlow{
    position:absolute; inset:0;
    background: radial-gradient(200px 30px at 20% 50%, rgba(255,255,255,.18), transparent 65%);
    opacity:.35;
    pointer-events:none;
    animation: sweep 2.8s ease-in-out infinite;
  }
  @keyframes sweep{
    from{transform: translateX(-18%)}
    to{transform: translateX(18%)}
  }

  .statsLine{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:center;
    justify-content:space-between;
    margin-top:10px;
    color: var(--muted);
    font-size: 12px;
  }
  .statsLine strong{color:var(--txt)}

  .actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }

  .btn{
    cursor:pointer;
    border:none;
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(255,255,255,.08);
    color: var(--txt);
    border: 1px solid rgba(255,255,255,.14);
    transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
    font-weight: 800;
  }
  .btn:hover{
    transform: translateY(-1px);
    background: rgba(255,255,255,.10);
    box-shadow: 0 18px 40px rgba(0,0,0,.22);
  }
  .btn:active{transform: translateY(0px) scale(.98)}
  .btn.primary{
    background: linear-gradient(90deg, rgba(139,92,246,.95), rgba(34,197,94,.90));
    border-color: rgba(255,255,255,.14);
    color:#081020;
  }

  /* List */
  .headerRow{
    display:grid;
    grid-template-columns: 110px 1fr 56px;
    padding: 10px 14px;
    color: var(--muted);
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,.10);
  }
  .list{
    flex:1;
    min-height:0;
    overflow:auto;
    scroll-behavior:smooth;
  }
  .row{
    display:grid;
    grid-template-columns: 110px 1fr 56px;
    gap: 0;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,.07);
    align-items:center;
    position:relative;
  }
  .row:last-child{border-bottom:none}
  .time{
    font-weight: 950;
    font-variant-numeric: tabular-nums;
    color: rgba(238,243,255,.92);
  }

  .input{
    width:100%;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.18);
    color: var(--txt);
    outline:none;
    transition: .15s ease;
  }
  .input::placeholder{color: rgba(238,243,255,.36)}
  .input:focus{
    border-color: rgba(139,92,246,.55);
    box-shadow: 0 0 0 4px rgba(139,92,246,.15);
  }

  .checkWrap{
    display:flex;
    justify-content:center;
    align-items:center;
  }
  input[type="checkbox"]{
    width:22px;height:22px;
    cursor:pointer;
    accent-color: var(--accent2);
    filter: drop-shadow(0 10px 25px rgba(34,197,94,.22));
  }

  /* DONE style */
  .row.done .input{
    text-decoration: line-through;
    opacity:.62;
    border-color: rgba(34,197,94,.35);
    background: rgba(34,197,94,.06);
  }
  .row.done::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background: linear-gradient(90deg, rgba(34,197,94,.10), transparent 55%);
  }

  /* NOW highlight */
  .row.now{
    background: linear-gradient(90deg, rgba(139,92,246,.16), rgba(139,92,246,.05));
  }
  .row.now::before{
    content:"الآن";
    position:absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 950;
    color: #0b1020;
    background: rgba(139,92,246,.95);
    box-shadow: 0 10px 25px rgba(139,92,246,.25);
  }

  /* tiny micro animation when toggling done */
  .pop{
    animation: pop .25s ease;
  }
  @keyframes pop{
    0%{transform: scale(.98)}
    65%{transform: scale(1.02)}
    100%{transform: scale(1)}
  }

  /* scrollbar */
  .list::-webkit-scrollbar{width:10px}
  .list::-webkit-scrollbar-thumb{
    background: rgba(255,255,255,.12);
    border-radius: 99px;
    border: 2px solid rgba(0,0,0,0);
    background-clip: padding-box;
  }
  .list::-webkit-scrollbar-track{background: transparent}

  /* confetti canvas */
  canvas#fx{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  @media (max-width: 640px){
    .headerRow,.row{grid-template-columns: 92px 1fr 44px}
    .time{font-size:13px}
  }
</style>
</head>

<body>
<div class="bgfx"></div>

<div class="wrap">
  <div class="top">
    <div class="brand">
      <h1 id="dayTitle">Daily System</h1>
      <div class="sub" id="daySub">—</div>
    </div>

    <div class="hud">
      <div class="pill" title="يتحدث تلقائياً">
        <span class="dot" aria-hidden="true"></span>
        <span>الوقت:</span>
        <span class="clock" id="clock">--:--</span>
      </div>
      <div class="pill" title="سلسلة أيام الإنجاز">
        <span>🔥</span>
        <span>Streak:</span>
        <strong id="streak">0</strong>
      </div>
    </div>
  </div>

  <div class="card">
    <canvas id="fx"></canvas>

    <div class="progressWrap">
      <div class="progressTop">
        <div class="rank">
          <div class="badge" id="badge">E</div>
          <div>
            <small>Rank اليوم</small>
            <strong id="rankText">ابدأ الآن…</strong>
          </div>
        </div>

        <div class="actions">
          <button class="btn" id="btnFocusNow">اذهب للآن</button>
          <button class="btn" id="btnExport">تصدير</button>
          <button class="btn" id="btnClear">مسح اليوم</button>
          <button class="btn primary" id="btnMotivate">حفّزني</button>
        </div>
      </div>

      <div class="bar" aria-label="progress">
        <i id="barFill"></i>
        <div class="barGlow"></div>
      </div>

      <div class="statsLine">
        <div>التقدّم: <strong id="pct">0%</strong> — <strong id="doneCount">0</strong>/<strong id="totalCount">0</strong> مهام منجزة</div>
        <div id="rangeInfo">—</div>
      </div>
    </div>

    <div class="headerRow">
      <div>الوقت</div>
      <div>المهمة</div>
      <div style="text-align:center">تم</div>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
  // ===== إعدادات الجدول =====
  const START_H = 4, START_M = 0;
  const END_H   = 22, END_M   = 30;
  const STEP_MIN = 30;

  const listEl = document.getElementById('list');
  const dayTitleEl = document.getElementById('dayTitle');
  const daySubEl = document.getElementById('daySub');
  const clockEl = document.getElementById('clock');
  const rangeInfoEl = document.getElementById('rangeInfo');

  const pctEl = document.getElementById('pct');
  const doneCountEl = document.getElementById('doneCount');
  const totalCountEl = document.getElementById('totalCount');
  const barFillEl = document.getElementById('barFill');
  const badgeEl = document.getElementById('badge');
  const rankTextEl = document.getElementById('rankText');
  const streakEl = document.getElementById('streak');

  const pad2 = n => String(n).padStart(2,'0');
  const fmtTime = (h,m) => `${pad2(h)}:${pad2(m)}`;
  const mins = (h,m) => h*60 + m;

  const todayISO = () => {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };

  const dayKey = () => `daily_slots_${todayISO()}`;
  const metaKey = () => `daily_meta`;

  function buildSlots(){
    const slots = [];
    let t = mins(START_H, START_M);
    const end = mins(END_H, END_M);
    while(t <= end){
      const h = Math.floor(t/60), m = t % 60;
      slots.push({ t, label: fmtTime(h,m) });
      t += STEP_MIN;
    }
    return slots;
  }

  function loadData(){
    try{ return JSON.parse(localStorage.getItem(dayKey()) || '{}'); }
    catch{ return {}; }
  }
  function saveData(data){
    localStorage.setItem(dayKey(), JSON.stringify(data));
  }

  function loadMeta(){
    try{ return JSON.parse(localStorage.getItem(metaKey()) || '{}'); }
    catch{ return {}; }
  }
  function saveMeta(meta){
    localStorage.setItem(metaKey(), JSON.stringify(meta));
  }

  function setHeader(){
    const d = new Date();
    const dayName = d.toLocaleDateString('ar-DZ', { weekday:'long' });
    const fullDate = d.toLocaleDateString('ar-DZ', { year:'numeric', month:'long', day:'numeric' });
    dayTitleEl.textContent = `Daily System — ${dayName}`;
    daySubEl.textContent = fullDate;
    rangeInfoEl.textContent = `من ${fmtTime(START_H,START_M)} إلى ${fmtTime(END_H,END_M)} — كل ${STEP_MIN} دقيقة`;
  }

  function tickClock(){
    const d = new Date();
    clockEl.textContent = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
  }

  function getRank(p){
    // p = 0..100
    if(p >= 95) return { letter:'S', text:'وحش 🔥 أكملت تقريباً كل شيء!' , bg:'linear-gradient(135deg, rgba(34,197,94,.95), rgba(139,92,246,.90))', color:'#081020'};
    if(p >= 85) return { letter:'A', text:'قريب جداً من القمة 💪' , bg:'linear-gradient(135deg, rgba(139,92,246,.95), rgba(245,158,11,.85))', color:'#081020'};
    if(p >= 70) return { letter:'B', text:'ممتاز… استمر 👏' , bg:'linear-gradient(135deg, rgba(245,158,11,.95), rgba(139,92,246,.85))', color:'#081020'};
    if(p >= 50) return { letter:'C', text:'نصف الطريق… شدها ⚡' , bg:'linear-gradient(135deg, rgba(255,255,255,.18), rgba(139,92,246,.70))', color:'#eef3ff'};
    if(p >= 25) return { letter:'D', text:'ابدأ بمهمة واحدة الآن ✅' , bg:'linear-gradient(135deg, rgba(239,68,68,.70), rgba(139,92,246,.70))', color:'#eef3ff'};
    return { letter:'E', text:'ابدأ… لا تفاوض نفسك.' , bg:'linear-gradient(135deg, rgba(255,255,255,.10), rgba(0,0,0,.22))', color:'#eef3ff'};
  }

  function computeProgress(){
    const data = loadData();
    const slots = buildSlots();
    // نحسب فقط السطور التي فيها نص (مهام فعلية)
    const active = slots.filter(s => (data[s.label]?.text || '').trim().length > 0);
    const total = active.length;
    const done = active.filter(s => !!data[s.label]?.done).length;
    const pct = total ? Math.round((done/total)*100) : 0;

    totalCountEl.textContent = String(total);
    doneCountEl.textContent = String(done);
    pctEl.textContent = `${pct}%`;
    barFillEl.style.width = `${pct}%`;

    const r = getRank(pct);
    badgeEl.textContent = r.letter;
    badgeEl.style.background = r.bg;
    badgeEl.style.color = r.color;
    rankTextEl.textContent = r.text;

    return {total, done, pct};
  }

  function render(){
    const slots = buildSlots();
    const data = loadData();
    listEl.innerHTML = '';

    const now = new Date();
    const nowMin = mins(now.getHours(), now.getMinutes());
    const start = mins(START_H, START_M);
    const end = mins(END_H, END_M);

    let closestRow = null, closestDelta = Infinity;

    slots.forEach(s => {
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.label = s.label;
      row.dataset.t = String(s.t);

      const time = document.createElement('div');
      time.className = 'time';
      time.textContent = s.label;

      const input = document.createElement('input');
      input.className = 'input';
      input.placeholder = 'اكتب مهمة… (ثم علّمها ✅)';
      input.value = data[s.label]?.text || '';

      const checkWrap = document.createElement('div');
      checkWrap.className = 'checkWrap';

      const check = document.createElement('input');
      check.type = 'checkbox';
      check.checked = !!data[s.label]?.done;

      if(check.checked) row.classList.add('done');

      input.addEventListener('input', () => {
        const fresh = loadData();
        const text = input.value;
        const done = !!check.checked;

        if(text.trim()){
          fresh[s.label] = { text, done };
        }else{
          // إذا فرغ النص: نحذف السطر من التخزين لتبقى الإحصائيات منطقية
          delete fresh[s.label];
          check.checked = false;
          row.classList.remove('done');
        }
        saveData(fresh);
        computeProgress();
      });

      check.addEventListener('change', () => {
        const fresh = loadData();
        const text = input.value;

        // لا نسمح بتشطيب سطر فاضي (تشجيعاً للوضوح)
        if(!text.trim()){
          check.checked = false;
          microShake(row);
          return;
        }

        row.classList.toggle('done', check.checked);
        row.classList.add('pop');
        setTimeout(()=>row.classList.remove('pop'), 280);

        fresh[s.label] = { text, done: !!check.checked };
        saveData(fresh);

        const {pct} = computeProgress();
        if(pct === 100) fireConfetti();
      });

      checkWrap.appendChild(check);

      row.appendChild(time);
      row.appendChild(input);
      row.appendChild(checkWrap);

      // NOW highlight: أقرب خانة للوقت الحالي
      const delta = Math.abs(s.t - nowMin);
      if(delta < closestDelta){
        closestDelta = delta;
        closestRow = row;
      }

      listEl.appendChild(row);
    });

    // تمييز الآن إذا داخل النطاق
    if(closestRow && nowMin >= start && nowMin <= end){
      closestRow.classList.add('now');
    }

    computeProgress();
  }

  function microShake(el){
    el.animate([
      {transform:'translateX(0)'},
      {transform:'translateX(-6px)'},
      {transform:'translateX(6px)'},
      {transform:'translateX(-4px)'},
      {transform:'translateX(4px)'},
      {transform:'translateX(0)'},
    ], {duration: 320, easing:'ease-out'});
  }

  // ===== Streak logic (تحفيزي) =====
  function updateStreak(){
    const meta = loadMeta();
    const today = todayISO();

    // streak value
    let streak = meta.streak || 0;
    const last = meta.lastEvaluated || null;

    // لا نعيد التقييم لنفس اليوم
    if(last === today){
      streakEl.textContent = String(streak);
      return;
    }

    // نقيّم اليوم السابق إذا كان موجوداً (عندما تفتح في يوم جديد)
    // القاعدة: إذا أمس أنجز >= 70% => streak++
    // إذا أقل => streak = max(0, streak-1)
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate()-1);
    const yISO = `${yesterday.getFullYear()}-${pad2(yesterday.getMonth()+1)}-${pad2(yesterday.getDate())}`;
    const yKey = `daily_slots_${yISO}`;

    let yData = {};
    try{ yData = JSON.parse(localStorage.getItem(yKey) || '{}'); }catch{}

    // احسب تقدم أمس
    const slots = buildSlots();
    const active = slots.filter(s => (yData[s.label]?.text || '').trim().length > 0);
    const total = active.length;
    const done = active.filter(s => !!yData[s.label]?.done).length;
    const pct = total ? Math.round((done/total)*100) : 0;

    if(last !== null){ // لدينا تاريخ سابق -> طبّق قاعدة streak عند الانتقال
      if(pct >= 70) streak += 1;
      else streak = Math.max(0, streak - 1);
    }

    meta.streak = streak;
    meta.lastEvaluated = today;
    saveMeta(meta);

    streakEl.textContent = String(streak);
  }

  // ===== Export =====
  function exportText(){
    const data = loadData();
    const slots = buildSlots();

    const lines = [];
    lines.push(dayTitleEl.textContent);
    lines.push(daySubEl.textContent);
    lines.push('—');
    slots.forEach(s=>{
      const item = data[s.label];
      if(item?.text?.trim()){
        lines.push(`${s.label} — ${item.done ? '✅' : '⬜'} ${item.text.trim()}`);
      }
    });

    const text = lines.join('\n');
    navigator.clipboard?.writeText(text).catch(()=>{});
    alert('تم النسخ ✅\n\n' + text);
  }

  // ===== Buttons =====
  document.getElementById('btnClear').addEventListener('click', () => {
    localStorage.removeItem(dayKey());
    render();
  });

  document.getElementById('btnExport').addEventListener('click', exportText);

  document.getElementById('btnFocusNow').addEventListener('click', () => {
    const nowRow = listEl.querySelector('.row.now') || listEl.querySelector('.row');
    nowRow?.scrollIntoView({behavior:'smooth', block:'center'});
    nowRow?.classList.add('pop');
    setTimeout(()=>nowRow?.classList.remove('pop'), 280);
  });

  const quotes = [
    "مهمة واحدة الآن > يوم كامل من التسويف.",
    "لا تبحث عن الحماس… اصنعه بفعل صغير.",
    "إذا أنهيت نصف المهام… فأنت أقوى من الأمس.",
    "ابدأ بالقبيح. الكمال يأتي لاحقاً.",
    "الآن لحظة ترقية الـ Rank.",
    "لا تفاوض نفسك… نفّذ.",
  ];
  document.getElementById('btnMotivate').addEventListener('click', () => {
    const q = quotes[Math.floor(Math.random()*quotes.length)];
    rankTextEl.textContent = q;
    badgeEl.classList.add('pop');
    setTimeout(()=>badgeEl.classList.remove('pop'), 280);
  });

  // ===== Confetti (Canvas) =====
  const fx = document.getElementById('fx');
  const ctx = fx.getContext('2d');
  let confetti = [];
  let confettiOn = false;

  function resizeFx(){
    const rect = fx.getBoundingClientRect();
    fx.width = Math.floor(rect.width * devicePixelRatio);
    fx.height = Math.floor(rect.height * devicePixelRatio);
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  window.addEventListener('resize', resizeFx);

  function fireConfetti(){
    if(confettiOn) return;
    confettiOn = true;

    const rect = fx.getBoundingClientRect();
    const cx = rect.width/2, cy = 30;

    const pieces = 120;
    confetti = Array.from({length: pieces}, (_,i)=>({
      x: cx + (Math.random()-0.5)*120,
      y: cy + Math.random()*20,
      vx: (Math.random()-0.5)*5,
      vy: Math.random()*4 + 2,
      r: Math.random()*3 + 2,
      a: 1,
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.2,
      life: 60 + Math.random()*50
    }));

    let t = 0;
    const loop = () => {
      t++;
      ctx.clearRect(0,0, rect.width, rect.height);

      confetti.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.03;
        p.rot += p.vr;
        p.life -= 1;
        p.a = Math.max(0, p.life/110);

        ctx.save();
        ctx.globalAlpha = p.a;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        // بدون تحديد ألوان ثابتة؟ هنا نستخدم تدرجات مستمدة من CSS بالشفافية فقط
        // رسم قطع بيضاء شفافة (شكل نيون يعتمد على الخلفية)
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillRect(-p.r, -p.r, p.r*2.2, p.r*1.2);
        ctx.restore();
      });

      confetti = confetti.filter(p=>p.life > 0 && p.y < rect.height + 40);
      if(confetti.length && t < 220){
        requestAnimationFrame(loop);
      }else{
        ctx.clearRect(0,0, rect.width, rect.height);
        confettiOn = false;
      }
    };
    loop();
  }

  // ===== Start =====
  setHeader();
  resizeFx();
  tickClock();
  render();
  updateStreak();

  // تحديث كل دقيقة: الساعة + تمييز الآن + تقدم
  setInterval(() => {
    tickClock();
    // إعادة رسم لتحديث now highlight (خفيف)
    render();
  }, 60_000);
</script>
</body>
</html>
